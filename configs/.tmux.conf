# --- General Settings ---
set -g default-terminal "screen-256color"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0

# --- Status Bar Style ---
set -g status-interval 1
set -g status-right-length 100
set -g status-right "#{?session_alerts,#[fg=red,bold]!! BG ACTIVITY !!#[default] ,} %H:%M %d-%b-%y"

# --- Pane Titles ---
set -g pane-border-status top
set -g pane-border-format " #P: #{pane_current_path} "
bind-key R command-prompt -p "Pane Name:" "select-pane -T '%%'"

# --- Copy Mode (Vim Style) ---
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# --- Activity & Alerts ---
setw -g monitor-activity on
set -g visual-activity off
set -g visual-bell off
set -g bell-action any

# High-Visibility Activity Styling
set -g window-status-activity-style "fg=white,bg=red,bold"
set -g window-status-bell-style "fg=white,bg=red,bold"

# Global Alert Hook
set-hook -g alert-activity 'run-shell "afplay /System/Library/Sounds/Ping.aiff; tmux display-message -a -d 0 \" !!! ACTIVITY: SESSION #S WINDOW #W !!! (Press any key)\""'
set-hook -g alert-bell     'run-shell "afplay /System/Library/Sounds/Ping.aiff; tmux display-message -a -d 0 \" !!! BELL: SESSION #S WINDOW #W !!! (Press any key)\""'

# --- Ergonomic Prefix ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Navigation (Arrows & HJKL) ---
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-Left select-pane -L
bind -n M-Down select-pane -D
bind -n M-Up select-pane -U
bind -n M-Right select-pane -R

# --- Window Navigation ---
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-H previous-window
bind -n M-L next-window
bind -n M-] next-window # Only next-window on ] to avoid [ conflict

# --- Functional Shortcuts ---
bind -n M-R command-prompt -I "#S" "rename-session '%%'"
bind -n M-r command-prompt -I "#W" "rename-window '%%'"
bind -n M-z resize-pane -Z
bind -n M-x confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind -n M-X confirm-before -p "kill-session #S? (y/n)" kill-session

# --- Visual Splitting ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind -n M-| split-window -h -c "#{pane_current_path}"
bind -n "M-\\" split-window -h -c "#{pane_current_path}"
bind -n M-- split-window -v -c "#{pane_current_path}"

# --- Structural Shortcuts ---
bind -n M-c new-window -c "#{pane_current_path}"     # Alt + c = New Window
bind -n M-[ copy-mode                                # Alt + [ = Scroll Mode (Critical)
bind -n M-s choose-tree -s                           # Alt + s = Session List

# --- Pane Resizing ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Advanced Pane/Layout Management ---
bind -n "M-{" swap-pane -D
bind -n "M-}" swap-pane -U
bind -n M-Space next-layout

# --- Popup Tools (Tmux 3.2+) ---
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"
bind t display-popup -E "btm"

# --- Fast Reload ---
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"
